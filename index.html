<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>🐾ねこタップゲーム（10匹バージョン）🐾</title>
<style>
  body {
    background-color: #ffe6f2;
    text-align: center;
    font-family: "Arial";
  }
  img {
    width: 200px;
    margin: 10px;
  }
</style>
</head>
<body>

<h1>🐾ねこにゃんパラダイス🐾</h1>

<!-- あなたがアップロードした画像を表示 -->
<img src="cropnekocyan458A5353.jpg" id="cat" alt="cat">

<p>タップ数：<span id="count">0</span></p>

<script>
  let count = 0;
  const cat = document.getElementById("cat");
  const counter = document.getElementById("count");

  cat.addEventListener("click", () => {
    count++;
    counter.textContent = count;
  });
</script>

</body>
</html>
