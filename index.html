<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>🐾ねこタップゲーム🐾</title>
<style>
  body {
    background: radial-gradient(circle, #ffe6f2, #d4b5ff);
    text-align: center;
    font-family: "Arial";
    overflow: hidden;
    margin: 0;
    padding: 0;
    position: relative;
  }

  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: url('https://i.imgur.com/8fFGk3Z.png');
    background-size: cover;
    opacity: 0.45;
    animation: twinkle 2s infinite alternate;
    pointer-events: none;
  }

  @keyframes twinkle {
    from { opacity: 0.25; }
    to { opacity: 0.55; }
  }

  #cat {
    width: 50vw;
    max-width: 100%;
    height: auto;
    transition: transform 0.15s, filter 0.2s;
    border-radius: 20px;
    position: relative;
    z-index: 2;
  }

  #count {
    font-size: 28px;
    margin-top: 10px;
    color: #ff7fa8;
    position: relative;
    z-index: 2;
  }

  .heart {
    position: absolute;
    font-size: 32px;
    color: #ff9ecb;
    animation: float 1.2s ease-out;
    pointer-events: none;
    z-index: 2;
  }

  @keyframes float {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

  /* にゃー（20回ごと） */
  #nyaa {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 160px;
    color: #ff4fa8;
    font-weight: bold;
    text-shadow: 0 0 20px #ff9ecb, 0 0 40px #ff4fa8;
    display: none;
    animation: pop 0.8s ease-out;
    pointer-events: none;
    z-index: 3;
  }

  /* シャーッ（100回ごと） */
  #shaa {
    position: fixed;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 200px;
    color: #ff0000;
    font-weight: bold;
    text-shadow: 0 0 30px #ff6666, 0 0 60px #ff0000;
    display: none;
    animation: shaaPop 0.8s ease-out;
    pointer-events: none;
    z-index: 3;
  }

  @keyframes pop {
    from { transform: translate(-50%, -50%) scale(0.1); opacity: 0; }
    to { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
  }

  @keyframes shaaPop {
    from { transform: translate(-50%, -50%) scale(0.1) rotate(-20deg); opacity: 0; }
    to { transform: translate(-50%, -50%) scale(1.4) rotate(5deg); opacity: 1; }
  }

  .mini-nyaa {
    position: absolute;
    font-size: 40px;
    color: #ff7fbf;
    animation: miniPop 1s ease-out;
    pointer-events: none;
    z-index: 3;
  }

  @keyframes miniPop {
    from { opacity: 0; transform: scale(0.2); }
    to { opacity: 1; transform: scale(1.2); }
  }
</style>
</head>
<body>

<h2 style="position:relative;z-index:2;">🐾 ねこタップゲーム 🐾</h2>

<img id="cat" src="cropnekocyan458A5353.jpg">

<div id="count">タップ数：0</div>

<div id="nyaa">にゃー！</div>
<div id="shaa">シャーッ！</div>
