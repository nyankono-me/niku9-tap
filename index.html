<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<!-- ダブルタップ拡大を無効化 -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>🐾ねこタップゲーム🐾</title>
<style>
  body {
    background-color: #ffe6f2;
    text-align: center;
    font-family: "Arial";
    overflow: hidden;
  }
  #cat {
    width: 760px; /* ←画像を今の倍に拡大（スマホ最大クラス） */
    transition: transform 0.15s, filter 0.2s;
    border-radius: 20px;
  }
  #count {
    font-size: 26px;
    margin-top: 20px;
    color: #ff7fa8;
  }
  .heart {
    position: absolute;
    font-size: 32px;
    color: #ff9ecb;
    animation: float 1.2s ease-out;
  }
  @keyframes float {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }
</style>
</head>
<body>

<h2>🐾 ねこタップゲーム 🐾</h2>

<img id="cat" src="cropnekocyan458A5353.jpg">

<div id="count">タップ数：0</div>

<script>
let count = 0;
const cat = document.getElementById("cat");
const countText = document.getElementById("count");

cat.addEventListener("click", () => {
  count++;
  countText.textContent = "タップ数：" + count;

  // ねこが喜ぶ（ぷるっと＋明るくなる）
  cat.style.transform = "scale(1.15)";
  cat.style.filter = "brightness(1.2)";
  setTimeout(() => {
    cat.style.transform = "scale(1)";
    cat.style.filter = "brightness(1)";
  }, 150);

  // ハート演出
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.textContent = ["❤️","💗","💕","💞"][Math.floor(Math.random()*4)];
  heart.style.left = (Math.random() * window.innerWidth) + "px";
  heart.style.top = (Math.random() * window.innerHeight) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 1200);
});
</script>

</body>
</html>
